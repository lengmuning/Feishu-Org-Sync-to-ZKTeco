name = "feishu-zkteco-sync"
main = "src/index.js"
compatibility_date = "2025-01-01"

[triggers]
crons = ["0 19 * * *"]

[vars]
ROOT_PARENTNUMBER = "111"

# Required secrets (set with `wrangler secret put <NAME>`):
#   FEISHU_APP_ID
#   FEISHU_APP_SECRET
#   FEISHU_VERIFICATION_TOKEN   # from Feishu console → Event Subscriptions
#   ZKTECO_ACCESS_KEY
#   ZKTECO_BASE_URL
